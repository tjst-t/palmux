<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
  <meta name="base-path" content="/">
  <meta name="auth-token" content="">
  <meta name="app-version" content="">
  <meta name="claude-path" content="claude">
  <meta name="theme-color" content="#16213e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Palmux">
  <title>Palmux</title>
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
</head>
<body>
  <!-- Drawer Overlay -->
  <div id="drawer-overlay" class="drawer-overlay"></div>

  <!-- Drawer Panel -->
  <div id="drawer" class="drawer">
    <div class="drawer-header">
      <span class="drawer-header-title">Projects</span>
      <span id="drawer-panel-target" class="drawer-panel-target"></span>
      <label class="drawer-sort-toggle" aria-label="Sort order">
        <span class="drawer-sort-label drawer-sort-label--active" data-sort="activity">Recent</span>
        <div class="drawer-sort-switch">
          <input type="checkbox" id="drawer-sort-checkbox">
          <span class="drawer-sort-slider"></span>
        </div>
        <span class="drawer-sort-label" data-sort="name">A-Z</span>
      </label>
      <button id="drawer-pin-btn" class="drawer-pin-btn" aria-label="Pin drawer">
        <svg class="drawer-pin-icon" width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="7" cy="4.5" r="2.5" stroke="currentColor" stroke-width="1.4"/>
          <line x1="7" y1="7" x2="7" y2="13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div id="drawer-content" class="drawer-content"></div>
    <div class="drawer-footer">
      <span class="drawer-footer-name">palmux</span>
      <span id="drawer-footer-version" class="drawer-footer-version"></span>
    </div>
  </div>

  <div id="app">
    <!-- Header -->
    <div id="header">
      <button id="drawer-btn" class="hidden" aria-label="Open drawer">&#9776;</button>
      <div id="header-title">Palmux</div>
      <div id="tab-bar-container" class="tab-bar hidden"></div>
      <button id="split-toggle-btn" aria-label="Toggle split screen">&#x2AFF;</button>
      <div id="connection-status" class="connection-status hidden">
        <span class="connection-dot"></span>
        <span class="connection-text"></span>
      </div>
      <button id="portman-btn" class="portman-btn hidden" aria-label="Open portman URL">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 2H3C2.44772 2 2 2.44772 2 3V13C2 13.5523 2.44772 14 3 14H13C13.5523 14 14 13.5523 14 13V10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M9 2H14V7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M14 2L7 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button id="github-btn" class="github-btn hidden" aria-label="Open GitHub Issues">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 1C4.13 1 1 4.13 1 8C1 11.1 3.05 13.71 5.86 14.68C6.23 14.75 6.36 14.53 6.36 14.34C6.36 14.17 6.36 13.71 6.35 13.11C4.34 13.56 3.91 12.13 3.91 12.13C3.57 11.29 3.08 11.07 3.08 11.07C2.42 10.62 3.13 10.63 3.13 10.63C3.86 10.68 4.25 11.38 4.25 11.38C4.9 12.5 5.96 12.17 6.38 11.99C6.44 11.52 6.63 11.19 6.83 11.01C5.24 10.82 3.57 10.21 3.57 7.57C3.57 6.77 3.86 6.12 4.27 5.61C4.2 5.42 3.95 4.68 4.33 3.68C4.33 3.68 4.94 3.48 6.35 4.41C6.93 4.25 7.47 4.17 8 4.17C8.53 4.17 9.07 4.25 9.65 4.41C11.06 3.48 11.67 3.68 11.67 3.68C12.05 4.68 11.8 5.42 11.73 5.61C12.14 6.12 12.43 6.77 12.43 7.57C12.43 10.22 10.76 10.82 9.16 11C9.42 11.23 9.65 11.68 9.65 12.37C9.65 13.37 9.64 14.18 9.64 14.34C9.64 14.53 9.77 14.76 10.15 14.68C12.95 13.71 15 11.1 15 8C15 4.13 11.87 1 8 1Z" fill="currentColor"/>
        </svg>
      </button>
      <div id="font-size-controls" class="font-size-controls hidden">
        <button id="font-decrease-btn" class="font-size-btn" aria-label="Decrease font size">A&#x2212;</button>
        <button id="font-increase-btn" class="font-size-btn" aria-label="Increase font size">A+</button>
      </div>
      <button id="toolbar-toggle-btn" class="hidden" aria-label="Toggle toolbar">&#9000;</button>
    </div>

    <!-- Main Content -->
    <div id="main">
      <!-- Session/Window List -->
      <div id="session-list">
        <div id="session-items"></div>
      </div>

      <!-- Panel Container (panels are created dynamically by PanelManager) -->
      <div id="panel-container" class="hidden"></div>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
